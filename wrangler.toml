name = "auth-techimpossible"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]
account_id = "df6bf0a4f7b939cfb3377af46ed698c8"
workers_dev = false

[[routes]]
pattern = "auth.techimpossible.com/*"
zone_name = "techimpossible.com"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_AFTER_KV_CREATE_OAUTH"

[[kv_namespaces]]
binding = "ALLOWLIST_KV"
id = "REPLACE_AFTER_KV_CREATE_ALLOWLIST"

[[kv_namespaces]]
binding = "TENANT_KV"
id = "REPLACE_AFTER_KV_CREATE_TENANT"

[vars]
GOOGLE_OIDC_CLIENT_ID = "150639949574-onkaavrc88u243l0ipj15r7t68sio0s5.apps.googleusercontent.com"
ISSUER = "https://auth.techimpossible.com"
ALLOWED_ADMIN_EMAILS = "peter.skaronis@techimpossible.com"

[observability]
enabled = true

# Secrets (set via `wrangler secret put` after first deploy):
# GOOGLE_OIDC_CLIENT_SECRET - from ~/.google-oidc-creds
# ADMIN_API_TOKEN          - random 32-byte hex; documented in tasks/admin-api-token.md
